name: Atualização Diária (Boi e Novilha)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  raspagem-completa:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 1. Baixar código do repositório
        uses: actions/checkout@v3

      - name: 2. Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Instalar bibliotecas
        run: pip install -r requirements.txt

      - name: 4. Rodar Scraper do Boi
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 300
          command: python scraper_boi.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 5. Rodar Scraper da Novilha
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 300
          command: python scraper_novilha.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 6. Atualizar histórico acumulativo
        run: python append_historico.py

      - name: 7. Salvar arquivos no GitHub
        run: |
          git config --global user.name 'Bot do Scraper'
          git config --global user.email 'actions@github.com'

          git add cotacoes_boi_hoje.json cotacoes_novilha_hoje.json \
                  data/historico_boi.csv data/historico_novilha.csv

          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Dados atualizados: $(date +'%Y-%m-%d')" && git push)

      - name: 8. Notificar sucesso no Telegram
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notificador.py "🐄 *Gado-Scraper Avisa:* Coleta do dia $(date +'%Y-%m-%d') concluída com sucesso. Cotações de boi gordo e novilha atualizadas."

      - name: 9. Notificar falha no Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notificador.py "❌ *Gado-Scraper* falhou em $(date +'%Y-%m-%d').
          Veja o log completo: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
